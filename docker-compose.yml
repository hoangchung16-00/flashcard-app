services:
  postgres:
    image: postgres:16-alpine
    container_name: flashcard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flashcard
      POSTGRES_PASSWORD: flashcard
      POSTGRES_DB: flashcard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flashcard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
